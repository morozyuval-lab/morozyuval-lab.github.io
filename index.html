<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuval Moroz - Creative Full Stack</title>
  <meta name="description" content="Creative Full Stack - video, motion, AI, brand, and product marketing.">

  <!-- ── Theme ───────────────────────────────────────────────── -->
  <meta name="theme-color" content="#000000">

  <!-- ── Open Graph ──────────────────────────────────────────── -->
  <meta property="og:title" content="Yuval Moroz - Creative Full Stack">
  <meta property="og:description" content="From strategy to final cut. Just helping ideas find their way into the world.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://yuvalmoroz.com">
  <meta property="og:image" content="https://yuvalmoroz.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- ── Twitter / X ─────────────────────────────────────────── -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Yuval Moroz - Creative Full Stack">
  <meta name="twitter:description" content="From strategy to final cut.">
  <meta name="twitter:image" content="https://yuvalmoroz.com/og-image.png">

  <!-- ── Favicon ─────────────────────────────────────────────── -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.svg">

  <!-- ── Fonts ───────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Nav ──────────────────────────────────────────────── -->
  <nav id="nav">
    <a class="nav-logo" href="#hero" id="nav-name">Yuval Moroz</a>
    <ul class="nav-links">
      <li><a href="#work">Work</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu" aria-expanded="false">
      <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
        <rect width="20" height="1.5" rx="0.75" fill="currentColor"/>
        <rect y="6.25" width="20" height="1.5" rx="0.75" fill="currentColor"/>
        <rect y="12.5" width="20" height="1.5" rx="0.75" fill="currentColor"/>
      </svg>
    </button>
  </nav>

  <!-- ── Mobile Menu ───────────────────────────────────────── -->
  <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
    <button class="mobile-menu-close" id="mobile-menu-close" aria-label="Close menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <nav class="mobile-menu-nav">
      <a href="#work"    class="mobile-menu-link">Work</a>
      <a href="#about"   class="mobile-menu-link">About</a>
      <a href="#contact" class="mobile-menu-link">Contact</a>
    </nav>
  </div>

  <!-- ── Hero ─────────────────────────────────────────────── -->
  <section id="hero">
    <h1 class="hero-name" id="hero-name">Yuval Moroz</h1>
    <p class="hero-title" id="hero-title"></p>
    <div class="hero-sub-row">
      <p class="hero-sub" id="hero-sub"></p>
      <a class="hero-cta" href="#work">
        Enough talking.
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <polyline points="19 12 12 19 5 12"/>
        </svg>
      </a>
    </div>
  </section>

  <!-- ── Work ─────────────────────────────────────────────── -->
  <section id="work">
    <div class="filter-bar-wrapper">
      <div class="filter-row-wrap">
        <div class="filter-bar" id="filter-bar"></div>
      </div>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </section>

  <!-- ── About ────────────────────────────────────────────── -->
  <section id="about">
    <div class="about-block">
      <p class="block-label">About</p>
      <p class="block-prose" id="about-text"></p>
    </div>
    <div class="about-block">
      <p class="block-label block-label--casual">put your finger down if you're good at:</p>
      <p class="block-practice" id="skills-list"></p>
    </div>
    <div class="about-block">
      <p class="block-label">Say hello</p>
      <p class="block-links">
        <a class="block-link js-email" href="#">Email</a><span class="block-dot">·</span><a class="block-link js-linkedin" href="#" target="_blank" rel="noopener">LinkedIn</a><span class="block-dot">·</span><a class="block-link js-phone" href="#">Phone</a>
      </p>
    </div>
  </section>

  <!-- ── Contact ──────────────────────────────────────────── -->
  <section id="contact">
    <p class="contact-label">Get in touch</p>
    <h2 class="contact-headline" id="contact-headline"></h2>
    <p class="contact-sub" id="contact-sub"></p>
    <div class="contact-buttons">
      <a class="btn btn-primary js-linkedin" href="#" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/>
          <rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
        </svg>
        LinkedIn
      </a>
      <a class="btn btn-secondary js-email" href="#">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="22,4 12,13 2,4"/>
        </svg>
        Email
      </a>
      <a class="btn btn-secondary js-phone" href="#">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.5 19.79 19.79 0 011.07 2 2 2 0 013 .18h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L7.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/>
        </svg>
        Phone
      </a>
    </div>
  </section>

  <!-- ── Footer ───────────────────────────────────────────── -->
  <footer>
    <span id="footer-name"></span>
    <span class="footer-tagline">Mostly human. Occasionally AI.</span>
    <span>© <span id="footer-year"></span></span>
  </footer>

  <!-- ── Modal ────────────────────────────────────────────── -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-label="Video player">
    <div class="modal-inner landscape" id="modal-inner">
      <div class="modal-video-wrap landscape-ratio" id="modal-video-wrap"></div>
      <div class="modal-meta">
        <div>
          <div class="modal-title" id="modal-title"></div>
          <div class="modal-role"  id="modal-role"></div>
        </div>
        <button class="modal-close" id="modal-close" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
